<body class="contact-page">

    <!-- Header -->
    <header>
        <h1>Kontakta Oss</h1>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="index.html">Home</a>
        <a href="#">About Us</a>
        <a href="contact.html">Contact</a>
    </nav>

    <!-- Kontaktsektion -->
    <section class="contact-section">
        <p>Fyll i formuläret nedan så hör vi av oss!</p>
        <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">
            <input type="hidden" name="access_key" value="6333242d-a748-4564-9e21-b153ae579a77">

            <input type="text" name="name" placeholder="Namn" class="contact-inputs" required>
            <input type="email" name="email" placeholder="Email" class="contact-inputs" required>
            <textarea name="message" placeholder="Meddelande" class="contact-inputs" required></textarea>
            <button type="submit">Skicka</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Website. Alla rättigheter reserverade.</p>
    </footer>



        <!-- Chatbot -->

<div id="chat-wrapper">
    <div id="chat-window" class="hidden">
        <div id="chat-header">
            <span>AI Assistent</span>
            <button onclick="toggleChat()">✖</button>
        </div>
        <div id="chat-messages">
            <p class="bot-msg">Hej! Hur kan jag hjälpa dig idag?</p>
        </div>
        <div id="chat-input-area">
            <input type="text" id="user-input" placeholder="Skriv något...">
            <button id="send-btn">Skicka</button>
        </div>
    </div>

    <button id="chat-button" onclick="toggleChat()">💬</button>
</div>

</body>
